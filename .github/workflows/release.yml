name: Build desktop apps

# Two ways to build installers for Windows, macOS (Intel + Apple Silicon) and Linux:
#   1) Actions tab → "Build desktop apps" → Run workflow → download from the run's Artifacts.
#   2) Push a version tag (git tag v0.1.1 && git push origin v0.1.1) → same builds, also
#      attached to a draft GitHub Release.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

# tauri-action creates a GitHub Release, which needs write access to the repo.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest      # Apple Silicon (.dmg)
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest      # Intel (.dmg)
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04      # .AppImage / .deb
            args: ""
          - platform: windows-latest    # .msi / .exe (NSIS)
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ startsWith(matrix.platform, 'macos') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build (and release on tag)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: "Book Nook ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # Always upload the installers as downloadable run artifacts, so a manual
      # (workflow_dispatch) run produces files even when there's no tag/Release.
      - name: Upload installers
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: book-nook-${{ matrix.platform }}-${{ strategy.job-index }}
          if-no-files-found: ignore
          path: |
            src-tauri/target/**/release/bundle/**/*.dmg
            src-tauri/target/**/release/bundle/**/*.msi
            src-tauri/target/**/release/bundle/**/*.exe
            src-tauri/target/**/release/bundle/**/*.AppImage
            src-tauri/target/**/release/bundle/**/*.deb
